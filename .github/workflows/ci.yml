name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ARM toolchain and QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-arm-linux-gnueabihf make qemu-user

      - name: Build
        run: make

      - name: Smoke test under QEMU
        run: |
          # El binario es estático (as/ld sin libc). Se ejecuta con entrada vacía
          # bajo timeout y se verifica que el juego arranca y pinta el banner.
          timeout 10 qemu-arm ./battleship < /dev/null > smoke_out.txt 2>&1 || true
          grep -q "Bienvenido Comandante" smoke_out.txt
          echo "Smoke OK: el juego arranca y renderiza el banner bajo QEMU"
